      <stop offset="0%" style="stop-color:#6DBE45; stop-opacity:1"></stop>
      <stop offset="100%" style="stop-color:#1F5A7A; stop-opacity:1"></stop>
    </linearGradient>
  </defs>

  <!-- Location Pin -->
  <path d="M200 50 C120 50 80 120 80 180 C80 260 200 350 200 350 C200 350 320 260 320 180 C320 120 280 50 200 50 Z" fill="url(#gradPin)"></path>

