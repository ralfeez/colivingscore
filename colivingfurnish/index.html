// ── Test harness ─────────────────────────────────────────────────────────────
function runTests() {
  const assert = (cond, msg) => {
    if (!cond) { console.error("FAIL:", msg); } else { console.log("PASS:", msg); }
  };
  return assert;
}

// ── parseItemFilters ──────────────────────────────────────────────────────────
function parseItemFilters(val) {
  const s = (val || "").toString().trim().toLowerCase();
  if (!s) return [];
  return s.split(",").map(v => v.trim()).filter(Boolean);
}

// inline tests — run once on load
(function() {
  const assert = runTests();
  assert(parseItemFilters("").length === 0, "parseItemFilters: blank → empty array");
  assert(parseItemFilters("all").length === 1, "parseItemFilters: all → ['all']");
  assert(parseItemFilters("seniors,sober").length === 2, "parseItemFilters: two values parsed");
  assert(parseItemFilters(" cold , hot ").includes("cold"), "parseItemFilters: values trimmed");
})();

// ── isItemVisible ─────────────────────────────────────────────────────────────
function isItemVisible(item, tenantType, climate) {
  if (item.required) return true;

  const tt = item.tenant_types;
  const cz = item.climate_zones;

  const tenantOk = tt.length === 0 || tt.includes("all") || tt.includes(tenantType);
  const climateOk = cz.length === 0 || cz.includes("all") || cz.includes(climate);

  return tenantOk && climateOk;
}

(function() {
  const assert = runTests();
  const req      = { required: true,  tenant_types: [],          climate_zones: [] };
  const optAll   = { required: false, tenant_types: [],          climate_zones: [] };
  const optSen   = { required: false, tenant_types: ["seniors"], climate_zones: [] };
  const optCold  = { required: false, tenant_types: [],          climate_zones: ["cold"] };
  const optBoth  = { required: false, tenant_types: ["nurses"],  climate_zones: ["cold"] };

  assert(isItemVisible(req, "students", "hot"),         "isItemVisible: required always shows");
  assert(isItemVisible(optAll, "students", "hot"),      "isItemVisible: blank cols → shows for all");
  assert(isItemVisible(optSen, "seniors", "cold"),      "isItemVisible: seniors item shows for seniors");
  assert(!isItemVisible(optSen, "students", "cold"),    "isItemVisible: seniors item hidden from students");
  assert(isItemVisible(optCold, "students", "cold"),    "isItemVisible: cold item shows in cold");
  assert(!isItemVisible(optCold, "students", "hot"),    "isItemVisible: cold item hidden in hot");
  assert(isItemVisible(optBoth, "nurses", "cold"),      "isItemVisible: nurses+cold: both match");
  assert(!isItemVisible(optBoth, "nurses", "hot"),      "isItemVisible: nurses+cold: wrong climate hidden");
  assert(!isItemVisible(optBoth, "students", "cold"),   "isItemVisible: nurses+cold: wrong tenant hidden");
})();

// ── computeMultiplier ─────────────────────────────────────────────────────────
function computeMultiplier(item, beds, baths) {
  if (item.per_window) return 1;
  if (item.qty_per_bedroom > 0) return item.qty_per_bedroom * beds;
  if (item.qty_per_bath > 0) return item.qty_per_bath * baths;
  if (item.qty_per_home > 0) return item.qty_per_home;
  return 1;
}

(function() {
  const assert = runTests();
  const bedItem  = { per_window: false, qty_per_bedroom: 1, qty_per_bath: 0, qty_per_home: 0 };
  const bathItem = { per_window: false, qty_per_bedroom: 0, qty_per_bath: 2, qty_per_home: 0 };
  const homeItem = { per_window: false, qty_per_bedroom: 0, qty_per_bath: 0, qty_per_home: 3 };
  const winItem  = { per_window: true,  qty_per_bedroom: 0, qty_per_bath: 0, qty_per_home: 0 };

  assert(computeMultiplier(bedItem, 4, 2)  === 4, "computeMultiplier: bed item ×4 beds");
  assert(computeMultiplier(bathItem, 4, 2) === 4, "computeMultiplier: bath item ×2 baths × qty 2");
  assert(computeMultiplier(homeItem, 4, 2) === 3, "computeMultiplier: home item fixed qty 3");
  assert(computeMultiplier(winItem, 4, 2)  === 1, "computeMultiplier: window item always ×1");
})();

// ── buildFurnishingsData ──────────────────────────────────────────────────────
function buildFurnishingsData(rows) {
  const num = (v) => parseFloat((v || "").toString().replace(/[$,\s]/g, "")) || 0;
  const clean = (v) => (v || "").toString().trim();

  const ROOM_ORDER = ["bedroom", "kitchen", "living", "bathroom", "laundry", "tech", "common"];
  const roomMap = {};

  rows.forEach((row, idx) => {
    const rawRoom = clean(row["Room / Area"]);
    if (!rawRoom) return;

    const roomId = ROOM_ID_MAP[rawRoom.toLowerCase()];
    if (!roomId) return;

    if (!roomMap[roomId]) {
      roomMap[roomId] = { ...ROOM_CONFIG[roomId], id: roomId, items: [] };
    }

    const item = {
      id: `row_${idx}`,
      name: clean(row["Item"]),
      notes: clean(row["Notes"]),
      room: roomId,
      required: clean(row["Required"]).toLowerCase() === "yes",
      link: clean(row["Affiliate URL"]),
      price_low: Math.max(0, num(row["Cost Each"])),
      qty_per_home: num(row["Min Quantity per home"]),
      qty_per_bedroom: num(row["Min Quantity per Bedroom"]),
      qty_per_bath: num(row["Min Quantity per Bath"]),
      qty_per_window: num(row["Quantity per window"]),
      per_window: num(row["Quantity per window"]) > 0,
      tenant_types: parseItemFilters(row["tenant_types"]),
      climate_zones: parseItemFilters(row["climate_zones"]),
      category: roomId,
    };

    if (item.name) roomMap[roomId].items.push(item);
  });

  return {
    rooms: ROOM_ORDER.filter(id => roomMap[id]).map(id => roomMap[id]),
    tenantTypes: [
      { id: "students",      label: "Students / Young Adults",  icon: "🎓" },
      { id: "professionals", label: "Working Professionals",    icon: "💼" },
      { id: "seniors",       label: "55+ / Seniors",            icon: "🌿" },
      { id: "nurses",        label: "Traveling Nurses",         icon: "🏥" },
      { id: "trades",        label: "Construction / Trades",    icon: "🔨" },
      { id: "nomads",        label: "Digital Nomads",           icon: "💻" },
      { id: "sober",         label: "Sober Living",             icon: "🤝" },
    ],
    climateZones: [
      { id: "cold",       label: "Cold / Northern",    description: "Zone 5–8 · Heavy winters, insulation critical", color: "#4a90d9" },
      { id: "temperate",  label: "Temperate / Mixed",  description: "Zone 3–4 · Mild seasons, year-round use",       color: "#5a9e6f" },
      { id: "hot",        label: "Hot / Southern",     description: "Zone 1–2 · Warm year-round, cooling essential", color: "#d97b4a" },
    ]
  };
}

// ── Step 1: Address ─────────────────────────────────────────────────────────
function StepAddress({ value, onChange, onNext }) {
  const [localVal, setLocalVal] = useState(value || "");
  const [focused, setFocused] = useState(false);
  const inputRef = useRef(null);
  useEffect(() => { inputRef.current && inputRef.current.focus(); }, []);

  function handleNext() {
    if (localVal.trim().length > 4) {
      onChange(localVal.trim());
      onNext();
    }
  }

  return (
    <div style={{ animation: "fadeUp 0.5s ease" }}>
      <div style={{ marginBottom: 12, display: "inline-block", background: "var(--terracotta)", color: "white", borderRadius: 20, padding: "4px 14px", fontSize: 12, fontWeight: 600, letterSpacing: 1, textTransform: "uppercase" }}>Step 1 of 4</div>
      <h1 style={{ fontFamily: "var(--font-display)", fontSize: "clamp(32px, 5vw, 52px)", fontWeight: 700, lineHeight: 1.15, marginBottom: 16, color: "var(--charcoal)" }}>
        Where is your<br /><em style={{ color: "var(--terracotta)" }}>co-living home?</em>
      </h1>
      <p style={{ color: "var(--text-muted)", fontSize: 17, marginBottom: 40, maxWidth: 480 }}>
        The address helps us tailor furnishing recommendations to your location — climate, region, and tenant market.
      </p>
      <div style={{
        position: "relative",
        marginBottom: 24,
        border: `2px solid ${focused ? "var(--terracotta)" : "var(--border)"}`,
        borderRadius: 14,
        background: "white",
        transition: "border-color 0.2s ease",
        boxShadow: focused ? "0 0 0 4px rgba(192,96,58,0.1)" : "none"
      }}>
        <span style={{ position: "absolute", left: 18, top: "50%", transform: "translateY(-50%)", fontSize: 20 }}>📍</span>
        <input
          ref={inputRef}
          value={localVal}
          onChange={e => setLocalVal(e.target.value)}
          onFocus={() => setFocused(true)}
          onBlur={() => setFocused(false)}
          onKeyDown={e => e.key === "Enter" && handleNext()}
          placeholder="123 Main St, Austin, TX 78701"
          style={{
            display: "block", width: "100%", padding: "18px 18px 18px 52px",
            fontSize: 17, border: "none", outline: "none", borderRadius: 12,
            fontFamily: "var(--font-body)", background: "transparent", color: "var(--charcoal)"

// ── Price helpers — high = floor * 1.3 ────────────────────────────────────
const pH = i => Math.round(i.price_low * 1.3);
const pMid = i => (i.price_low + pH(i)) / 2;

// ── Budget bar ──────────────────────────────────────────────────────────────
function BudgetBar({ items, checked, quantities }) {
  const fmt = n => "$" + Math.round(n).toLocaleString();
  const q = (i) => (quantities && quantities[i.id] != null) ? quantities[i.id] : (i._multiplier || 1);

  const requiredTotal = useMemo(() =>
    items.filter(i => i.required).reduce((s, i) => s + pMid(i) * q(i), 0),
  [items, quantities]);
  const optionalTotal = useMemo(() =>
    items.filter(i => !i.required).reduce((s, i) => s + pMid(i) * q(i), 0),
  [items, quantities]);
  const requiredSpent = useMemo(() =>
    items.filter(i => i.required && checked[i.id]).reduce((s, i) => s + pMid(i) * q(i), 0),
  [items, checked, quantities]);
  const optionalSpent = useMemo(() =>
    items.filter(i => !i.required && checked[i.id]).reduce((s, i) => s + pMid(i) * q(i), 0),
  [items, checked, quantities]);

  const requiredPct = requiredTotal > 0 ? Math.min(100, Math.round((requiredSpent / requiredTotal) * 100)) : 0;
  const optionalPct = optionalTotal > 0 ? Math.min(100, Math.round((optionalSpent / optionalTotal) * 100)) : 0;
  const requiredRemaining = requiredTotal - requiredSpent;

  return (
    <div style={{ background: "white", borderRadius: 16, padding: "20px 24px", boxShadow: "0 2px 16px rgba(30,58,74,0.07)", marginBottom: 24 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4 }}>
        <span style={{ fontFamily: "var(--font-display)", fontSize: 14, fontWeight: 700 }}>Minimum Budget</span>
        <span style={{ fontSize: 12, color: "var(--text-muted)" }}>
          <strong style={{ color: "var(--terracotta)" }}>{fmt(requiredSpent)}</strong> / {fmt(requiredTotal)}
        </span>
      </div>
      <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 10 }}>Required items · scaled by beds &amp; baths</div>
      <div style={{ height: 10, background: "var(--cream-dark)", borderRadius: 5, overflow: "hidden", marginBottom: 6 }}>
        <div style={{ height: "100%", width: `${requiredPct}%`, background: "linear-gradient(90deg, var(--terracotta), var(--terracotta-light))", borderRadius: 5, transition: "width 0.4s ease" }} />
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 16, fontSize: 11, color: "var(--text-muted)" }}>
        <span>{requiredPct}% acquired</span>
        <span style={{ color: requiredRemaining > 0 ? "var(--terracotta)" : "var(--sage)", fontWeight: 600 }}>
          {requiredRemaining > 0 ? `${fmt(requiredRemaining)} still needed` : "✓ Required complete"}
        </span>
      </div>

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4 }}>
        <span style={{ fontSize: 12, fontWeight: 600, color: "var(--text-muted)" }}>Optional Upgrades</span>
        <span style={{ fontSize: 12, color: "var(--text-muted)" }}>
          <strong style={{ color: "var(--sage)" }}>{fmt(optionalSpent)}</strong> / {fmt(optionalTotal)}
        </span>
      </div>
      <div style={{ height: 6, background: "var(--cream-dark)", borderRadius: 3, overflow: "hidden" }}>
        <div style={{ height: "100%", width: `${optionalPct}%`, background: "linear-gradient(90deg, var(--sage), var(--sage-light))", borderRadius: 3, transition: "width 0.4s ease" }} />
      </div>
      <div style={{ marginTop: 5, fontSize: 11, color: "var(--text-muted)", textAlign: "right" }}>{optionalPct}% of upgrades acquired</div>

      <div style={{ marginTop: 14, paddingTop: 14, borderTop: "1px solid var(--border)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontSize: 12, color: "var(--text-muted)" }}>Total committed</span>
        <span style={{ fontFamily: "var(--font-display)", fontSize: 16, fontWeight: 700, color: "var(--charcoal)" }}>{fmt(requiredSpent + optionalSpent)}</span>
      </div>
    </div>
  );
}

// ── Item row ────────────────────────────────────────────────────────────────
function ItemRow({ item, checked, onToggle, qty, onQtyChange }) {
  const [hovered, setHovered] = useState(false);
  const isChecked = checked[item.id];
  const priceLow = item.price_low;
  const priceHigh = Math.round(priceLow * 1.3);
  const unitPrice = `$${Math.round(priceLow)}–$${priceHigh} each`;
  const totalPrice = qty > 1 ? `$${Math.round(priceLow * qty)} total` : null;
  const perWindowPrice = item.per_window ? `$${Math.round(priceLow)}–$${priceHigh} per window` : null;

  return (
    <div
      className="item-row"
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{
        display: "flex", alignItems: "center", gap: 14, padding: "14px 16px",
        borderRadius: 14, border: `1.5px solid ${isChecked ? "var(--sage-light)" : hovered ? "var(--border)" : "transparent"}`,
        background: isChecked ? "rgba(107,140,110,0.06)" : hovered ? "white" : "transparent",
        transition: "all 0.18s ease", cursor: "pointer"

      onClick={() => onToggle(item.id)}

      <div style={{
        width: 24, height: 24, borderRadius: 7, border: `2px solid ${isChecked ? "var(--sage)" : "var(--border)"}`,
        background: isChecked ? "var(--sage)" : "transparent",
        display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, transition: "all 0.15s ease"

// ── Room section ────────────────────────────────────────────────────────────
function RoomSection({ room, tenantType, climate, beds, baths, checked, onToggle, isActive, onActivate, quantities, onQtyChange }) {
  // Filter items by tenant type and climate, required always visible
  const visibleItems = useMemo(() => {
    return room.items
      .filter(item => isItemVisible(item, tenantType, climate))
      .sort((a, b) => (b.required ? 1 : 0) - (a.required ? 1 : 0))
      .map(item => ({ ...item, _multiplier: computeMultiplier(item, beds, baths) }));
  }, [room.items, tenantType, climate, beds, baths]);

  const requiredItems = visibleItems.filter(i => i.required);
  const optionalItems = visibleItems.filter(i => !i.required);
  const checkedCount = visibleItems.filter(i => checked[i.id]).length;
  const pct = visibleItems.length > 0 ? Math.round((checkedCount / visibleItems.length) * 100) : 0;
  const [showOptional, setShowOptional] = useState(false);

  return (
    <div id={`room-${room.id}`} className="room-section" style={{ marginBottom: 16 }}>
      {/* Room header — always visible */}
      <button
        onClick={onActivate}
        style={{
          width: "100%", padding: "20px 24px", borderRadius: isActive ? "20px 20px 0 0" : 20,
          background: isActive ? "var(--charcoal)" : "white",
          border: `2px solid ${isActive ? "var(--charcoal)" : "var(--border)"}`,
          cursor: "pointer", display: "flex", alignItems: "center", gap: 16,
          transition: "all 0.25s ease", textAlign: "left",
          boxShadow: isActive ? "0 8px 32px rgba(30,28,24,0.16)" : "0 2px 12px rgba(30,28,24,0.05)"
        }}
      >
        <span style={{ fontSize: 28 }}>{room.icon}</span>
        <div style={{ flex: 1 }}>
          <div style={{ fontFamily: "var(--font-display)", fontSize: 18, fontWeight: 700, color: isActive ? "white" : "var(--charcoal)", marginBottom: 4 }}>{room.name}</div>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ height: 4, width: 120, background: isActive ? "rgba(255,255,255,0.2)" : "var(--cream-dark)", borderRadius: 2, overflow: "hidden" }}>
              <div style={{ height: "100%", width: `${pct}%`, background: isActive ? "var(--terracotta-light)" : "var(--terracotta)", borderRadius: 2, transition: "width 0.3s ease" }} />
            </div>
            <span style={{ fontSize: 12, color: isActive ? "rgba(255,255,255,0.6)" : "var(--text-muted)" }}>{checkedCount}/{visibleItems.length} items</span>
          </div>
        </div>
        <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 4 }}>
          <span style={{ fontSize: 13, fontWeight: 700, color: isActive ? "var(--terracotta-light)" : "var(--terracotta)" }}>{pct}%</span>
          <span style={{ fontSize: 18, color: isActive ? "rgba(255,255,255,0.5)" : "var(--text-muted)", transition: "transform 0.25s ease", display: "inline-block", transform: isActive ? "rotate(180deg)" : "none" }}>⌄</span>
        </div>
      </button>

      {/* Room body */}
      {isActive && (
        <div style={{
          background: "var(--cream)", border: "2px solid var(--charcoal)", borderTop: "none",
          borderRadius: "0 0 20px 20px", padding: 24, animation: "fadeUp 0.3s ease", overflow: "hidden"
        }}>
          <StoryCard room={room} tenantType={tenantType} />

          {/* Required items */}
          <div style={{ marginBottom: 8, display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 11, fontWeight: 700, color: "var(--terracotta)", textTransform: "uppercase", letterSpacing: 1 }}>Required ({requiredItems.length})</span>
            <div style={{ flex: 1, height: 1, background: "var(--border)" }} />
          </div>
          <div style={{ marginBottom: 20 }}>
            {requiredItems.map(item => (
              <ItemRow key={item.id} item={item} checked={checked} onToggle={onToggle}
                qty={quantities[item.id] ?? item._multiplier} onQtyChange={onQtyChange} />
            ))}
          </div>

          {/* Optional items toggle */}
          {optionalItems.length > 0 && (
            <>
              <button
                onClick={() => setShowOptional(!showOptional)}

                  display: "flex", alignItems: "center", gap: 8, marginBottom: showOptional ? 12 : 0,
                  background: "none", border: "none", cursor: "pointer", padding: 0, fontFamily: "var(--font-body)"
                }}
              >
                <span style={{ fontSize: 11, fontWeight: 700, color: "var(--sage)", textTransform: "uppercase", letterSpacing: 1 }}>Optional ({optionalItems.length})</span>
                <span style={{ fontSize: 13, color: "var(--sage)", transform: showOptional ? "rotate(180deg)" : "none", transition: "transform 0.2s", display: "inline-block" }}>⌄</span>
              </button>

                <div key={item.id} className={!checked[item.id] ? "optional-hidden" : ""}>

                </div>
              ))}
            </>
          )}
        </div>
      )}
    </div>
  );

// ── Progress ring ───────────────────────────────────────────────────────────
function ProgressRing({ pct, size = 80 }) {
  const r = (size - 10) / 2;
  const circ = 2 * Math.PI * r;
  const dash = circ * (pct / 100);
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ transform: "rotate(-90deg)" }}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--cream-dark)" strokeWidth="8" />
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--terracotta)" strokeWidth="8"
        strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
        style={{ transition: "stroke-dasharray 0.6s ease" }} />
      <text x={size/2} y={size/2} textAnchor="middle" dominantBaseline="middle"
        fill="var(--charcoal)" fontSize={size * 0.22} fontWeight="700"
        fontFamily="var(--font-display)" style={{ transform: `rotate(90deg) translate(0, 0)` }}>
      </text>
    </svg>
  );
}

    localStorage.setItem(`clf-checked-${project.address}`, JSON.stringify(checked));

    localStorage.setItem(`clf-qty-${project.address}`, JSON.stringify(quantities));

  const allItems = useMemo(() => {
    const rooms = window.FURNISHINGS_DATA.rooms;

        .map(item => ({

  }, [project.tenantType, project.climate, project.beds, project.baths]);

            </div>
            {[
              { label: `Items (${project.beds} tenant${project.beds > 1 ? "s" : ""})`, val: `${totalChecked}/${allItems.length}` },
              { label: "Min. Required Left", val: `${fmt(totalBudgetLow)}–${fmt(totalBudgetHigh)}` }
            ].map(s => (
              <div key={s.label} style={{ background: "rgba(255,255,255,0.07)", borderRadius: 14, padding: "16px 20px", textAlign: "center", border: "1px solid rgba(255,255,255,0.1)" }}>
                <div style={{ fontFamily: "var(--font-display)", fontSize: 22, fontWeight: 700, color: "white" }}>{s.val}</div>
                <div style={{ fontSize: 11, color: "rgba(255,255,255,0.4)", marginTop: 4 }}>{s.label}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      <MobileTabs
        rooms={window.FURNISHINGS_DATA.rooms}
        activeRoom={activeRoom}
        onSelect={setActiveRoom}
        project={project}
        checked={checked}
      />

      {/* Main content */}
      <div className="dash-layout" style={{ flex: 1, maxWidth: 1100, margin: "0 auto", width: "100%", padding: "32px clamp(16px, 4vw, 48px)", display: "grid", gridTemplateColumns: "240px 1fr", gap: 32, alignItems: "start" }}>

        {/* Sidebar nav */}
        <div className="dash-sidebar" style={{ position: "sticky", top: 80 }}>
          <div style={{ background: "white", borderRadius: 20, padding: 16, boxShadow: "0 2px 16px rgba(30,28,24,0.07)" }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: "var(--text-muted)", textTransform: "uppercase", letterSpacing: 1, marginBottom: 12, padding: "0 8px" }}>Rooms</div>
            {rooms.map(room => {
              const roomItems = room.items.filter(item =>
                isItemVisible(item, project.tenantType, project.climate)
              );
              const roomChecked = roomItems.filter(i => checked[i.id]).length;
              const roomPct = roomItems.length > 0 ? Math.round((roomChecked / roomItems.length) * 100) : 0;
              const isAct = activeRoom === room.id;
              return (
                <button key={room.id} onClick={() => setActiveRoom(room.id)} style={{
                  width: "100%", padding: "10px 12px", borderRadius: 12, border: "none",
                  background: isAct ? "rgba(192,96,58,0.08)" : "transparent",
                  cursor: "pointer", display: "flex", alignItems: "center", gap: 10,
                  fontFamily: "var(--font-body)", marginBottom: 4, transition: "all 0.15s ease"
                }}>
                  <span style={{ fontSize: 18 }}>{room.icon}</span>
                  <div style={{ flex: 1, textAlign: "left" }}>
                    <div style={{ fontSize: 13, fontWeight: 600, color: isAct ? "var(--terracotta)" : "var(--charcoal)" }}>{room.name}</div>
                    <div style={{ height: 3, background: "var(--cream-dark)", borderRadius: 2, marginTop: 4, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${roomPct}%`, background: isAct ? "var(--terracotta)" : "var(--sage-light)", borderRadius: 2 }} />
                    </div>
                  </div>
                  <span style={{ fontSize: 11, color: "var(--text-muted)" }}>{roomPct}%</span>
                </button>
              );
            })}
          </div>

          {/* Budget summary in sidebar */}
          <div style={{ marginTop: 16 }}>
            <BudgetBar items={allItems} checked={checked} quantities={quantities} />
          </div>
        </div>

        {/* Room detail */}
        <div style={{ minWidth: 0 }}>
          {rooms.map(room => (
            <RoomSection
              key={room.id}
              room={room}
              tenantType={project.tenantType}
              climate={project.climate}
              beds={project.beds}
              baths={project.baths}
              checked={checked}
              onToggle={toggleItem}
              isActive={activeRoom === room.id}
              onActivate={() => setActiveRoom(activeRoom === room.id ? null : room.id)}
              quantities={quantities}
              onQtyChange={onQtyChange}
            />
          ))}
          <div className="mobile-budget" style={{ display: "none" }}>
            <BudgetBar items={allItems} checked={checked} quantities={quantities} />
          </div>
        </div>
      </div>

    </div>
  );
}

// APP ROOT
// ══════════════════════════════════════════════════════════════════════════════
// App.jsx — root component, state machine


const STORAGE_KEY = "clf-project-v1";

function App() {
  const [project, setProject] = useState(() => {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      return saved ? JSON.parse(saved) : null;
    } catch { return null; }
  });
  const [dataReady, setDataReady] = useState(false);
  const [dataError, setDataError] = useState(null);

  useEffect(() => {
    if (project) localStorage.setItem(STORAGE_KEY, JSON.stringify(project));
    else localStorage.removeItem(STORAGE_KEY);
  }, [project]);

  useEffect(() => {
    Papa.parse("furnishings.csv", {
      download: true,
      header: true,
      skipEmptyLines: true,
      transformHeader: h => h.trim(),
      complete: (results) => {
        window.FURNISHINGS_DATA = buildFurnishingsData(results.data);
        setDataReady(true);
      },
      error: (err) => {
        setDataError(err.message);
      }
    });
  }, []);

  function handleComplete(data) { setProject(data); }
  function handleReset() {
    if (window.confirm("Start a new project? Your current checklist will be cleared.")) {
      setProject(null);
    }
  }

  if (dataError) {
    return (
      <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "var(--cream)", flexDirection: "column", gap: 16 }}>
        <Logo />
        <p style={{ color: "var(--terracotta)", fontSize: 15 }}>Could not load furnishings data: {dataError}</p>
        <p style={{ color: "var(--text-muted)", fontSize: 13 }}>Ensure <code>furnishings.csv</code> is in the same folder as <code>index.html</code> and you are serving via a local server (not opening the file directly).</p>
      </div>
    );
  }

  if (!dataReady) {
    return (
      <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "var(--cream)", flexDirection: "column", gap: 24 }}>
        <Logo size={32} />
        <div style={{ fontSize: 14, color: "var(--text-muted)" }}>Loading furnishing data…</div>
        <div style={{
          width: 40, height: 40, borderRadius: "50%",
          border: "3px solid rgba(30,28,24,0.1)",
          borderTop: "3px solid var(--terracotta)",
          animation: "spin 0.8s linear infinite"
        }} />
      </div>
    );
  }

  if (!project) return <Wizard onComplete={handleComplete} />;
  return <Dashboard project={project} onReset={handleReset} />;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);


</script>
</body>
